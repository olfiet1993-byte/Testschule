name: KI Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Nur bei echten PRs, nicht bei automatischen Dependabot-PRs etc.
    if: github.actor != 'dependabot[bot]'

    permissions:
      contents: read
      pull-requests: write  # Für PR-Kommentar

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # vollständige History für Diff

      - name: PR Diff holen
        id: diff
        run: |
          git fetch origin main
          # Nur src/ und Konfig-Dateien — keine Migrations-SQLs, keine Lockfiles
          DIFF=$(git diff origin/main...HEAD \
            -- 'src/**' '*.config.*' 'drizzle/schema.ts' \
            | head -c 25000)  # max 25k Zeichen an Claude
          echo "DIFF<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: KI Review
        id: review
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"

          DIFF='${{ steps.diff.outputs.DIFF }}'

          PROMPT="Du bist ein Senior Engineer und reviewst einen PR für eine Next.js Schulplattform (Testschule).

          PR-Titel: $PR_TITLE
          PR-Beschreibung: $PR_BODY

          Fokussiere deinen Review auf:
          1. **Sicherheit** – Auth-Bypass, SQL-Injection, XSS, ungeschützte Server Actions
          2. **DSGVO** – Schüler-Personendaten korrekt behandelt? Kein Logging persönlicher Daten?
          3. **Logikfehler** – Off-by-one, Race Conditions, fehlende Error Handling
          4. **Breaking Changes** – DB-Schema-Änderungen ohne Migration, API-Änderungen
          5. **Performance** – N+1-Queries, fehlende Indizes bei neuen DB-Spalten

          Sei konkret: zeige Datei + Zeilennummer wenn möglich.
          Halte dich kurz. Wenn alles in Ordnung ist, schreibe nur: '✅ Kein kritisches Problem gefunden.'
          Nutze Markdown für die Antwort. Deutsch.

          Diff:
          \`\`\`diff
          $DIFF
          \`\`\`"

          RESPONSE=$(curl -s https://api.anthropic.com/v1/messages \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "content-type: application/json" \
            -d "$(jq -n \
              --arg model "claude-haiku-4-5-20251001" \
              --arg prompt "$PROMPT" \
              '{
                model: $model,
                max_tokens: 1024,
                messages: [{ role: "user", content: $prompt }]
              }')")

          REVIEW_TEXT=$(echo "$RESPONSE" | jq -r '.content[0].text // "Fehler beim Review"')

          echo "REVIEW_TEXT<<EOF" >> $GITHUB_OUTPUT
          echo "$REVIEW_TEXT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: PR Kommentar posten
        uses: actions/github-script@v7
        with:
          script: |
            const reviewText = `${{ steps.review.outputs.REVIEW_TEXT }}`;
            const body = [
              '## 🤖 KI Code Review',
              '',
              reviewText,
              '',
              '---',
              '_Automatischer Review durch Claude Haiku. Kein Ersatz für manuellen Review bei sicherheitskritischen Änderungen._',
            ].join('\n');

            // Alten Review-Kommentar ersetzen falls vorhanden
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.startsWith('## 🤖 KI Code Review')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
