<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Pflege-Kreuz im Kreis (Stethoskop-artig) -->
  <g transform="translate(256 256)" fill="none" stroke="#ffffff" stroke-width="22" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="130" stroke-width="20"/>
    <!-- Plus -->
    <line x1="-60" y1="0" x2="60" y2="0"/>
    <line x1="0" y1="-60" x2="0" y2="60"/>
    <!-- Mörser-Punkt unten rechts -->
    <circle cx="90" cy="90" r="20" fill="#fbbf24" stroke="#fbbf24"/>
  </g>
</svg>
